server:
  port: 9090

spring:
  main:
      web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: usuarios-service
            uri: http://localhost:9091
            predicates:
            - Path=/usuarios/**

          - id: cines-service
            uri: http://localhost:9093
            predicates:
            - Path=/cines/**

          - id: salas-service
            uri: http://localhost:9094
            predicates:
            - Path=/salas/**
