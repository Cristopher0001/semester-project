spring.application.name=fidelizacion-service
server.port=9096

spring.datasource.url=jdbc:mysql://localhost:3306/bd_fidelizacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:/db/changelog/db.changelog.sql
logging.file.name=logs/fidelizacion-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n